<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantity Measurement — Login</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="auth-page">
    <div class="auth-card">

      <!-- LEFT BRANDING PANEL -->
      <div class="auth-left">
        <div class="auth-icon-wrap">
          <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
            <rect x="6" y="20" width="34" height="6" rx="3" fill="white" opacity="0.9"/>
            <rect x="6" y="20" width="4" height="14" rx="2" fill="white" opacity="0.7"/>
            <rect x="36" y="12" width="4" height="22" rx="2" fill="white" opacity="0.7"/>
            <circle cx="23" cy="14" r="5" fill="#fbbf24"/>
          </svg>
        </div>
        <div class="brand-sub">Quantity</div>
        <div class="brand-main">MEASUREMENT</div>
        <div class="brand-tagline">Measure, Convert &amp; Compare</div>
        <ul class="auth-features">
          <li>Length &amp; Weight</li>
          <li>Temperature</li>
          <li>Volume</li>
        </ul>
      </div>

      <!-- RIGHT FORM PANEL -->
      <div class="auth-right">
        <div class="auth-tabs">
          <div class="auth-tab active" data-tab="login" onclick="switchTab('login')">Login</div>
          <div class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Signup</div>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form" class="auth-form">
          <div class="field-group">
            <label class="field-label">Email Id</label>
            <div class="input-wrap">
              <input type="email" id="login-email" placeholder="Enter your email" autocomplete="email" />
            </div>
            <span class="field-error" id="login-email-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
              <button class="toggle-pw" type="button" onclick="togglePw('login-password', this)" tabindex="-1" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="login-pw-err"></span>
          </div>
          <button class="btn-primary" onclick="handleLogin()">Login</button>
          <p class="auth-switch">Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signup-form" class="auth-form hidden">
          <div class="field-group">
            <label class="field-label">Full Name</label>
            <div class="input-wrap">
              <input type="text" id="signup-name" placeholder="Enter your full name" autocomplete="name" />
            </div>
            <span class="field-error" id="signup-name-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">Email Id</label>
            <div class="input-wrap">
              <input type="email" id="signup-email" placeholder="Enter your email" autocomplete="email" />
            </div>
            <span class="field-error" id="signup-email-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" />
              <button class="toggle-pw" type="button" onclick="togglePw('signup-password', this)" tabindex="-1" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="signup-pw-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" />
              <button class="toggle-pw" type="button" onclick="togglePw('signup-confirm', this)" tabindex="-1" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="signup-confirm-err"></span>
          </div>
          <button class="btn-primary" onclick="handleSignup()">Create Account</button>
          <p class="auth-switch">Already have an account? <a onclick="switchTab('login')">Login</a></p>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
</body>
</html>
